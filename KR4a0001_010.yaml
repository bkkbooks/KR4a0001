body:
  text: 大招青春受謝白日昭只春氣奮發萬物遽只冥淩浹行魂無逃只魂魄歸徠無遠遙只魂乎歸徠無東無西無南無北只東有大海溺水浟浟只螭龍並流上下悠悠只霧雨淫淫白皓膠只魂乎無東湯谷寂只魂乎無南南有炎火千里蝮蛇蜒只山林險隘虎豹蜿只鰅鱅短狐王虺騫只魂乎無南蜮傷躬只魂乎無西西方流沙漭洋洋只豕首縱目被髮鬤只長爪踞牙誒笑狂只魂乎無西多害傷只魂乎無北北有寒山逴龍赩只代水不可涉深不可測只天白皓皓寒凝凝只魂乎無往盈北極只魂魄歸徠間以靜只自恣荊楚安以定只逞志究欲心意安只窮身永樂年壽延只魂乎歸徠樂不可言只五穀六仞設菰粱只鼎臑盈望和致芳只內鶬鴿鵠味豺羹只魂乎歸徠恣所嘗只鮮蠵甘雞和楚酪只醢豚苦狗膾苴蒪只吳酸蒿蔞不沾薄只魂兮歸徠恣所擇只炙鴰蒸鳧煔鶉敶只煎鰿𦞦雀遽爽存只魂乎歸徠麗以先只四酎并孰不歰嗌只清馨凍飲不啜役只吳醴白糵和楚瀝只魂乎歸徠不遽惕只代秦鄭衛鳴竽張只伏戲駕辨楚勞商只謳和揚阿趙簫倡只魂乎歸徠定空桑只二八接舞投詩賦只叩鍾調磬娛人亂只四上競氣極聲變只魂乎歸徠聽歌撰只朱脣皓齒嫭以姱只比德好間習以都只豐肉微骨調以娛只魂乎歸徠安以舒只嫮目宜笑娥眉曼只容則秀雅稚朱顏只魂乎歸徠靜以安只姱修滂浩麗以佳只曾頰倚耳曲眉規只滂心綽態姣麗施只小腰秀頸若鮮卑只魂乎歸徠思怨移只易中利心以動作只粉白黛黑施芳澤只長袂拂面善留客只魂乎歸徠以娛昔只青色直眉美目媔只靨輔奇牙宜笑嘕只豐肉微骨體便娟只魂乎歸徠恣所便只夏屋廣大沙堂秀只南房小壇觀絶霤只曲屋步壛宜擾畜只騰駕步遊獵春囿只瓊轂錯衡英華假只茝蘭桂樹鬱彌路只魂乎歸徠恣志慮只孔雀盈園畜鸞皇只鵾鴻群晨雜鶖鶬只鴻鵠代遊曼鷫鷞只魂乎歸徠鳳皇翔只曼澤怡面血氣盛只永宜厥身保壽命只室家盈廷爵祿盛只魂乎歸徠居室定只接徑千里出若雲只三圭重侯聽類神只察篤夭隱孤寡存只魂兮歸徠正始昆只田邑千畛人阜昌只美冒衆流德澤章只先威後文善美明只魂乎歸徠賞罰當只名聲若日照四海只德譽配天萬民理只北至幽陵南交址只西薄羊腸東窮海只魂乎歸徠尚賢士只發政獻行禁苛暴只舉傑壓陛誅譏罷只直贏在位近禹麾只豪傑執政流澤施只魂乎徠歸國家為只雄雄赫赫天德明只三公穆穆登降堂只諸侯畢極立九卿只昭質既設大侯張只執弓挾矢揖辭讓只魂乎徠歸尚三王只
