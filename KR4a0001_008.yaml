body:
  text: 九辯悲哉秋之為氣也蕭瑟兮草木搖落而變衰憭慄兮若在遠行登山臨水兮送將歸泬寥兮天高而氣清寂寥兮收潦而水清憯悽增欷兮薄寒之中人愴怳懭悢兮去故而就新坎廩兮貧士失職而志不平廓落兮羇旅而無友生惆悵兮而私自憐燕翩翩其辭歸兮蟬寂漠而無聲鴈廱廱而南遊兮鵾雞啁哳而悲鳴獨申旦而不寐兮哀蟋蟀之宵征時亹亹而過中兮蹇淹留而無成悲憂窮戚兮獨處廓有美一人兮心不繹去鄉離家兮徠遠客超逍遙兮今焉薄專思君兮不可化君不知兮可柰何蓄怨兮積思心煩憺兮忘食事願一見兮道余意君之心兮與余異車既駕兮朅而歸不得見兮心傷悲倚結軨兮長太息涕潺湲兮下霑軾忼慨絕兮不得中瞀亂兮迷惑私自憐兮何極心怦怦兮諒直皇天平分四時兮竊獨悲此廩秋白露既下百草兮奄離披此梧楸去白日之昭昭兮襲長夜之悠悠離芳藹之方壯兮余萎約而悲愁秋既先戒以白露兮冬又申之以嚴霜收恢台之孟夏兮然欿傺而沈藏葉菸邑而無色兮枝煩挐而交橫顏淫溢而將罷兮柯彷彿而萎黃萷櫹槮之可哀兮形銷鑠而瘀傷惟其紛糅而將落兮恨其失時而無當擥騑轡而下節兮聊逍遙以相佯歲忽忽而遒盡兮恐余壽之弗將悼余生之不時兮逢此世之俇攘澹容與而獨倚兮蟋蟀鳴此西堂心怵惕而震盪兮何所憂之多方卬明月而太息兮步列星而極明竊悲夫蕙華之曾敷兮紛旖旎乎都房何曾華之無實兮從風雨而飛颺以為君獨服此蕙兮羌無以異於眾芳閔奇思之不通兮將去君而高翔心閔憐之慘悽兮願一見而有明重無怨而生離兮中結軫而增傷豈不鬱陶而思君兮君之門以九重猛犬狺狺而迎吠兮關梁閉而不通皇天淫溢而秋霖兮后土何時而得漧塊獨守此無澤兮仰浮雲而永歎何時俗之工巧兮背繩墨而改錯卻騏驥而不乘兮策駑駘而取路當世豈無騏驥兮誠莫之能善御見執轡者非其人兮故駶跳而遠去鳧鴈皆唼夫粱藻兮鳳愈飄翔而高舉圜鑿而方枘兮吾固知其鉏鋙而難入眾鳥皆有所登棲兮鳳獨遑遑而無所集願銜枚而無言兮嘗被君之渥洽太公九十乃顯榮兮誠未遇其匹合謂騏驥兮安歸謂鳳皇兮安棲變古易俗兮世衰今之相者兮舉肥騏驥伏匿而不見兮鳳皇高飛而不下鳥獸猶知懷德兮何云賢士之不處驥不驟進而求服兮鳳亦不貪餧而妄食君棄遠而不察兮雖願忠其焉得欲寂漠而絕端兮竊不敢忘初之厚德獨悲愁其傷人兮馮鬱鬱其何極霜露慘悽而交下兮心尚幸其弗濟霰雪雰糅其增加兮乃知遭命之將至願徼幸而有待兮泊莽莽與𡐨草同死願自往而徑遊兮路壅絕而不通欲循道而平驅兮又未知其所從然中路而迷惑兮自壓桉而學誦性愚陋以褊淺兮信未達乎從容竊美申包胥之氣盛兮恐時世之不固何時俗之工巧兮滅規矩而改鑿獨耿介而不隨兮願慕先聖之遺教處濁世而顯榮兮非余心之所樂與其無義而有名兮寧窮處而守高食不媮而為飽兮衣不苟而為溫竊慕詩人之遺風兮願託志乎素餐蹇充倔而無端兮泊莽莽而無垠無衣裘以御冬兮恐溘死不得見乎陽春靚杪秋之遙夜兮心繚悷而有哀春秋逴逴而日高兮然惆悵而自悲四時遞來而卒歲兮陰陽不可與儷偕白日晼晚其將入兮明月銷鑠而減毀歲忽忽而遒盡兮老冉冉而愈弛心搖悅而日幸兮然怊悵而無冀中憯惻之悽愴兮長太息而增欷年洋洋以日往兮老嵺廓而無處事亹亹而覬進兮蹇淹留而躊躇何氾濫之浮雲兮猋壅蔽此明月忠昭昭而願見兮然霠曀而莫達願皓日之顯行兮雲蒙蒙而蔽之竊不自聊而願忠兮或黕點而汙之堯舜之抗行兮瞭冥冥而薄天何險巇之嫉妒兮被以不慈之偽名彼日月之照明兮尚黯黮而有瑕何況一國之事兮亦多端而膠加被荷裯之晏晏兮然潢洋而不可帶既驕美而伐武兮負左右之耿介憎慍惀之脩美兮好夫人之慷慨眾踥蹀而日進兮美超遠而逾邁農夫輟耕而容與兮恐田野之蕪穢事緜緜而多私兮竊悼後之危敗世雷同而炫曜兮何毀譽之昧昧今脩飾而窺鏡兮後尚可以竄藏願寄言夫流星兮羌儵忽而難當卒壅蔽此浮雲兮下暗漠而無光堯舜皆有所舉任兮故高枕而自適諒無怨於天下兮心焉取此怵惕椉騏驥之瀏瀏兮馭安用夫強策諒城郭之不足恃兮雖重介之何益邅翼翼而無終兮忳惽惽而愁約生天地之若過兮功不成而無效願沈滯而不見兮尚欲布名乎天下然潢洋而不遇兮直怐愗而自苦莽洋洋而無極兮忽翱翔之焉薄國有驥而不知椉兮焉皇皇而更索甯戚謳於車下兮桓公聞而知之無伯樂之善相兮今誰使乎譽之罔流涕以聊慮兮惟著意而得之紛純純之願忠兮妒被離而鄣之願賜不肖之軀而別離兮放遊志乎雲中椉精氣之摶摶兮騖諸神之湛湛驂白霓之習習兮歷群靈之豐豐左朱雀之茇茇兮右蒼龍之躣躣屬雷師之闐闐兮通飛廉之衙衙前輊輬之鏘鏘兮後輜椉之從從載雲旗之委蛇兮扈屯騎之容容計專專之不可化兮願遂推而為臧賴皇天之厚德兮還及君之無恙
