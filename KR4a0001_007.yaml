body:
  text: 漁父屈原既放遊於江潭行吟澤畔顏色憔悴形容枯稿漁父見而問之曰子非三閭大夫與何故至於斯屈原曰舉世皆濁我獨清衆人皆醉我獨醒是以見放漁父曰聖人不凝滯於物而能與世推移世人皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而啜其釃何故深思高舉自令放為屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬於江魚之腹中安能以皓皓之白而蒙世俗之塵埃乎漁父莞爾而笑鼓枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言
