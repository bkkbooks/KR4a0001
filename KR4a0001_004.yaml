body:
  text: 九章惜誦惜誦以致愍兮發憤以杼情所作忠而言之兮指蒼天以為正令五帝以㭊中兮戒六神與嚮服俾山川以備御兮命咎繇使聽直竭忠誠以事君兮反離群而贅疣忘儇媚以背衆兮待明君其知之言與行其可迹兮情與貌其不變故相臣莫若君兮所以證之不遠吾誼先君而後身兮羌衆人之所仇專惟君而無他兮又衆兆之所讎一心而不豫兮羌不可保也疾親君而無他兮有招禍之道也思君其莫我忠兮忽忘身之賤貧事君而不二兮迷不知寵之門忠何罪以遇罰兮亦非余心之所志行不群以巔越兮又衆兆之所咍紛逢尤以離謗兮謇不可釋情沈抑而不達兮又蔽而莫之白心鬱邑余他傺兮又莫察余之中情固煩言不可結詒兮願陳志而無路退靜默而莫余知兮進號呼又莫吾聞申他傺之煩惑兮中悶瞀之忳忳昔余夢登天兮魂中道而無杭吾使厲神占之兮曰有志極而無旁終危獨以離異兮曰君可思而不可恃故衆口其鑠金兮初若是而逢殆懲於羹者而吹𩐋兮何不變此志也欲釋階而登天兮猶有曩之態也衆駭遽以離心兮又何以為此伴也同極而異路兮又何以為此援也晉申生之孝子兮父信讒而不好行婞直而不豫兮鯀功用而不就吾聞作忠以造怨兮忽謂之過言九折臂而成醫兮吾至今而知其信然矰弋機而在上兮罻羅張而在下設張辟以娛君兮願側身而無所欲儃佪以干傺兮恐重患而離尤欲高飛而遠集兮君罔謂汝何之欲橫奔而失路兮堅志而不忍背膺牉以交痛兮心鬱結而紆軫檮木蘭以矯蕙兮𥽿申椒以為糧播江離與滋菊兮願春日以為糗芳恐情質之不信兮故重著以自明矯茲媚以私處兮願曾思而遠身涉江余幼好此奇服兮年既老而不衰帶長鋏之陸離兮冠切雲之崔嵬被明月兮珮寶璐世溷濁而莫余知兮吾方高馳而不顧駕青虬兮驂白螭吾與重華遊兮瑤之圃登崑崙兮食玉英與天地兮同壽與日月兮同光哀南夷之莫吾知兮旦余濟乎江湘乘鄂渚而反顧兮欸秋冬之緒風步余馬兮山皋邸余車兮方林乘舲船余上沅兮齊吳榜以擊汰船容與而不進兮淹回水而疑滯朝發枉渚兮夕宿辰陽苟余心其端直兮雖僻遠之何傷入漵浦余儃佪兮迷不知吾所如深林杳以冥冥兮猿狖之所居山峻高以蔽日兮下幽晦以多雨霰雪紛其無垠兮雲霏霏而承宇哀吾生之無樂兮幽獨處乎山中吾不能變心而從俗兮固將愁苦而終窮接輿髡首兮桑扈裸行忠不必用兮賢不必以伍子逢殃兮比干菹醢與前世而皆然兮吾又何怨乎今之人余將董道而不豫兮固將重昏而終身亂曰鸞鳥鳳皇日以遠兮燕雀烏鵲巢堂壇兮露申辛夷死林薄兮腥臊並御芳不得薄兮陰陽易位時不當兮懷信侘傺忽乎吾將行兮哀郢皇天之不純命兮何百姓之震愆民離散而相失兮方仲春而東遷去故鄉而就遠兮遵江夏以流亡出國門而軫懷兮甲之鼂吾以行發郢都而去閭兮荒忽其焉極楫齊揚以容與兮哀見君而不再得望長楸而太息兮涕淫淫其若霰過夏首而西浮兮顧龍門而不見心嬋媛而傷懷兮眇不知其所跖順風波以從流兮焉洋洋而為客淩陽侯之泛濫兮忽翱翔之焉薄心絓結而不解兮思蹇産而不釋將運舟而下浮兮上洞庭而下江去終古之所居兮今逍遙而來東羌靈魂之欲歸兮何須臾而忘反背夏浦而西思兮哀故都之日遠登大墳以遠望兮聊以舒吾憂心哀州土之平樂兮悲江介之遺風當陵陽之焉至兮渺南渡之焉如曾不知夏之為丘兮孰兩東門之可蕪心不怡之長久兮憂與愁其相接惟郢路之遼遠兮江與夏之不可涉忽若不信兮至今九年而不復慘鬱鬱而不通兮蹇侘傺而含戚外承歡之汋約兮諶荏弱而難持忠湛湛而願進兮妒被離而鄣之堯舜之抗行兮瞭杳杳而薄天衆讒人之嫉妒兮被以不慈之僞名憎慍惀之修美兮好夫人之慷慨衆踥蹀而日進兮美超遠而逾邁亂曰曼余目以流觀兮冀一反之何時鳥飛反故鄉兮狐死必首丘信非吾罪而棄逐兮何日夜而忘之抽思心鬱鬱之憂思兮獨永歎乎增傷思蹇産之不釋兮曼遭夜之方長悲秋風之動容兮何回極之浮浮數惟蓀之多怒兮傷余心之懮懮願搖起而橫奔兮覽民尤以自鎮結微情以陳詞兮矯以遺夫美人昔君與我誠言兮曰黃昏以為期羌中道而回畔兮反既有此他志憍吾以其美好兮覽余以其修姱與余言而不信兮蓋為余而造怒願承閒而自察兮心震悼而不敢悲夷猶而冀進兮心怛傷之憺憺茲歷情以陳辭兮蓀詳聾而不聞固切人之不媚兮衆果以我為患初吾所陳之耿著兮豈至今其庸亡何毒藥之謇謇兮願蓀美之可完望三五以為像兮指彭咸以為儀夫何極而不至兮故遠聞而難虧善不由外來兮名不可以虛作孰無施而有報兮孰不實而有穫少歌曰與美人抽怨兮并日夜而無正憍吾以其美好兮敖朕辭而不聽倡曰有鳥自南兮來集漢北好姱佳麗兮牉獨處此異域既惸獨而不群兮又無良媒在其側道卓遠而日忘兮願自申而不得望北山而流涕兮臨流水而太息望孟夏之短夜兮何晦明之若歲惟郢路之遼遠兮魂一夕而九逝曾不知路之曲直兮南指月與列星願徑逝而未得兮魂識路之營營何靈魂之信直兮人之心不與吾心同理弱而媒不通兮尚不知余之從容亂曰長瀨湍流泝江潭兮狂顧南行聊以娛心兮軫石崴嵬蹇吾願兮超回志度行隱進兮低佪夷猶宿北姑兮煩冤瞀容實沛徂兮愁歎苦神靈遙思兮路遠處幽又無行媒兮道思作頌聊以自救兮憂心不遂斯言誰告兮懷沙滔滔孟夏兮草木莽莽傷懷永哀兮汩徂南土眴兮杳杳孔靜幽默鬱結紆軫兮離慜而長鞠撫情效志兮冤屈而自抑刓方以為圜兮常度未替易初本迪兮君子所鄙章畫志墨兮前圖未改內厚質正兮大人所盛巧倕不斫兮孰察其撥正玄文處幽兮矇瞍謂之不章離婁微睇兮瞽以為無明變白以為黑兮倒上以為下鳳皇在笯兮雞鶩翔舞同糅玉石兮一概而相量夫惟黨人鄙固兮羌不知余之所臧任重載盛兮陷滯而不濟懷瑾握瑜兮窮不知所示邑犬之群吠兮吠所怪也非俊疑傑兮固庸態也文質疏內兮衆不知余之異采材朴委積兮莫知余之所有重仁襲義兮謹厚以為豐重華不可遌兮孰知余之從容古固有不並兮豈知其何故湯禹久遠兮邈而不可慕懲連改忿兮抑心而自強離慜而不遷兮願志之有像進路北次兮日昧昧其將暮舒憂娛哀兮限之以大故亂曰浩浩沅湘分流汩兮修路幽蔽道遠忽兮懷質抱情獨無匹兮伯樂既沒驥焉程兮萬民之生各有所錯兮定心廣志余何畏懼兮曾傷爰哀永歎喟兮世溷濁莫吾知人心不可謂兮知死不可讓願勿愛兮明告君子吾將以為類兮思美人思美人兮攬涕而佇眙媒絶路阻兮言不可結而詒蹇蹇之煩冤兮陷滯而不發申旦以舒中情兮志沈菀而莫達願寄言於浮雲兮遇豐隆而不將因歸鳥而致辭兮羌宿高而難當高辛之靈盛兮遭玄鳥而致詒欲變節以從俗兮愧易初而屈志獨歷年而離愍兮羌馮心猶未化寧隱閔而壽考兮何變易之可為知前轍之不遂兮未改此度車既覆而馬顛兮蹇獨懷此異路勒騏驥而更駕兮造父為我操之遷逡次而勿驅兮聊假日以須時指嶓冢之西隈兮與纁黃以為期開春發歲兮白日出之悠悠吾將蕩志而愈樂兮遵江夏以娛憂攬大薄之芳茝兮搴長洲之宿莽惜吾不及古人兮吾誰與玩此芳草解萹薄與雜菜兮備以為交佩佩繽紛以繚轉兮遂萎絶而離異吾且儃佪以娛憂兮觀南人之變態竊快在中心兮揚厥憑而不俟芳與澤其雜糅兮羌芳華自中出紛郁郁其遠承兮滿內而外揚情與質信可保兮羌居蔽而聞章令薜荔以為理兮憚舉趾而緣木因芙蓉而為媒兮憚蹇裳而濡足登高吾不說兮入下吾不能固朕形之不服兮然容與而狐疑廣遂前畫兮未改此度也命則處幽吾將罷兮願及白日之未暮獨焭焭而南行兮思彭咸之故也惜往日惜往日之曾信兮受命詔以昭詩奉先功以照下兮明法度之嫌疑國富強而法立兮屬貞臣而日娭祕密事之載心兮雖過失猶弗治心純厖而不泄兮遭讒人而嫉之君含怒而待臣兮不清徹其然否蔽晦君之聰明兮虛惑誤又以欺弗參驗以考實兮遠遷臣而弗思信讒諛之溷濁兮盛氣志而過之何貞臣之無罪兮被離謗而見尤慚光景之誠信兮身幽隱而備之臨沅湘之玄淵兮遂自忍而沈流卒沒身而絶名兮惜壅君之不昭君無度而弗察兮使芳草為藪幽焉舒情而抽信兮恬死亡而不聊獨鄣壅而蔽隱兮使貞臣為無由聞百里之為虜兮伊尹烹於庖廚呂望屠於朝歌兮寧戚歌而飯牛不逢湯武與桓繆兮世孰云而知之吳信讒而弗味兮子胥死而後憂介子忠而立枯兮文君寤而追求封介山而為之禁兮報大德之優游思久故之親身兮因縞素而哭之或忠信而死節兮或訑謾而不疑弗省察而按實兮聽讒人之虛辭芳與澤其雜糅兮孰申旦而別之何芳草之早夭兮微霜降而下戒諒聰不明而蔽壅兮使讒諛而日得自前世之嫉賢兮謂蕙若其不可佩妒佳冶之芬芳兮嫫母姣而自好雖有西施之美容兮讒妒入以自代願陳情以白行兮得罪過之不意情冤見之日明兮如列宿之錯置乘騏驥而馳騁兮無轡銜而自載乘泛泭以下流兮無舟楫而自備背法度而心治兮辟與此其無異寧溘死而流亡兮恐禍殃之有再不畢辭而赴淵兮惜壅君之不識橘頌后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更一志兮緑葉素榮紛其可喜兮曾枝剡棘圓果摶兮青黃雜糅文章爛兮精色內白類可任兮紛縕宜修姱而不醜兮嗟爾幼志有以異兮獨立不遷豈不可喜兮深固難徙廓其無求兮蘇世獨立橫而不流兮閉心自慎不終失過兮秉德無私參天地兮願歲并謝與長友兮淑離不淫梗其有理兮年歲雖少可師長兮行比伯夷置以為像兮悲回風悲回風之搖蕙兮心冤結而內傷物有微而隕性兮聲有隱而先倡夫何彭咸之造思兮暨志介而不忘萬變其情豈可蓋兮孰虛僞之可長鳥獸鳴以號群兮草苴比而不芳魚葺鱗以自別兮蛟龍隱其文章故荼薺不同畝兮蘭茝幽而獨芳惟佳人之永都兮更統世而自貺眇遠志之所及兮憐浮雲之相羊介眇志之所惑兮竊賦詩之所明惟佳人之獨懷兮折若椒以自處曾歔欷之嗟嗟兮獨隱伏而思慮涕泣交而凄凄兮思不眠以至曙終長夜之曼曼兮掩此哀而不去寤從容以周流兮聊逍遙以自恃傷太息之愍憐兮氣於邑而不可止糾思心以為纕兮編愁苦以為膺折若木以蔽光兮隨飄風之所仍存髣佛而不見兮心踊躍其若湯撫珮衽以案志兮超惘惘而遂行歲曶曶其若頽兮時亦冉冉而將至薠蘅槁而節離兮芳以歇而不比憐思心之不可懲兮證此言之不可聊寧逝死而流亡兮不忍為此之常愁孤子吟而抆淚兮放子出而不還孰能思而不隱兮照彭咸之所聞登石巒以遠望兮路眇眇之默默入景響之無應兮聞省想而不可得愁鬱鬱之無快兮居戚戚而不可解心鞿羈而不形兮氣繚轉而自締穆眇眇之無垠兮莽芒芒之無儀聲有隱而相感兮物有純而不可為藐蔓蔓之不可量兮縹綿綿之不可紆愁悄悄之常悲兮翩冥冥之不可娛淩大波而流風兮託彭咸之所居上高巖之峭岸兮處雌霓之標顛據青冥而攄虹兮遂倏忽而捫天吸湛露之浮源兮漱凝霜之氛氛依風穴以自息兮忽傾寤以嬋媛馮崑崙以瞰霧兮隱岷山以清江憚涌湍之礚礚兮聽波聲之洶洶紛容容之無經兮罔芒芒之無紀軋洋洋之無從兮馳委移之焉止漂翻翻其上下兮翼遙遙其左右泛潏潏其前後兮伴張弛之信期觀炎氣之相仍兮窺煙液之所積悲霜雪之俱下兮聽潮水之相擊借光景以往來兮施黃棘之枉策求介子之所存兮見伯夷之放迹心調度而弗去兮刻著志之無適曰吾怨往昔之所冀兮悼來者之惕惕浮江淮而入海兮從子胥而自適望大河之洲渚兮悲申徒之抗迹驟諫君而不聽兮重任石之何益心絓結而不解兮思蹇産而不釋
