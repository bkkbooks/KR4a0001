body:
  text: 招魂朕幼清以廉潔兮身服義而未沬主此盛德兮牽於俗而蕪穢上無所考此盛德兮長離殃而愁苦帝告巫陽曰有人在下我欲輔之魂魄離散汝筮予之巫陽對曰掌㝱上帝其難從若必筮予之恐後之謝不能復用巫陽焉乃下招曰魂兮歸來去君之恆幹何為四方些舍君之樂處而離彼不祥些魂兮歸來東方不可以託些長人千仞惟魂是索些十日代出流金鑠石些彼皆習之魂往必釋些歸來兮不可以託些魂兮歸來南方不可以止些雕題黑齒得人肉以祀以其骨為醢些蝮蛇蓁蓁封狐千里些雄虺九首往來儵忽吞人以益其心些歸來兮不可以久淫些魂兮歸來西方之害流沙千里些旋入雷淵爢散而不可止些幸而得脫其外曠宇些赤螘若象玄蜂若壺些五穀不生藂菅是食些其土爛人求水無所得些彷徉無所倚廣大無所極些歸來兮恐自遺賊些魂兮歸來北方不可以止些增冰峨峨飛雪千里些歸來兮不可以久些魂兮歸來君無上天些虎豹九關啄害下人些一夫九首拔木九千些豺狼從目往來侁侁些懸人以娭投之深淵些致命於帝然後得瞑些歸來往恐危身些魂兮歸來君無下此幽都些土伯九約其角觺觺些敦脄血拇逐人駓駓些參目虎首其身若牛些此皆甘人歸來恐自遺災些魂兮歸來入脩門些工祝招君背行先些秦篝齊縷鄭綿絡些招具該備永嘯呼些魂兮歸來反故居些天地四方多賊姦些像設君室靜閒安些高堂邃宇檻層軒些層臺累榭臨高山些網戶朱綴刻方連些冬有穾廈夏室寒些川谷徑復流潺湲些光風轉蕙氾崇蘭些經堂入奧朱塵筵些砥室翠翹挂曲瓊些翡翠珠被爛齊光些蒻阿拂壁羅幬張些纂組綺縞結琦璜些室中之觀多珍怪些蘭膏明燭華容備些二八侍宿射遞代些九侯淑女多迅眾些盛鬋不同制實滿宮些容態好比順彌代些弱顏固植謇其有意些姱容脩態絚洞房些蛾眉曼睩目騰光些靡顏膩理遺視矊些離榭脩幕侍君之閒些翡帷翠帳飾高堂些紅壁沙版玄玉梁些仰觀刻桷畫龍蛇些坐堂伏檻臨曲池些芙蓉始發雜芰荷些紫莖屏風文緣波些文異豹飾侍陂陁些軒輬既低步騎羅些蘭薄戶樹瓊木籬些魂兮歸來何遠為些室家遂宗食多方些稻粢穱麥挐黃粱些大苦醎酸辛甘行些肥牛之腱臑若芳些和酸若苦陳吳羹些胹鱉炮羔有柘漿些鵠酸臇鳧煎鴻鶬些露雞臛蠵厲而不爽些粔籹蜜餌有餦餭些瑤漿蜜勺實羽觴些挫糟凍飲酎清涼些華酌既陳有瓊漿些歸來反故室敬而無妨些肴羞未通女樂羅些敶鍾按鼓造新歌些涉江采菱發揚荷些美人既醉朱顏酡些娭光眇視目曾波些被文服纖麗而不奇些長髮曼鬋豔陸離些二八齊容起鄭舞些衽若交竿撫案下些竽瑟狂會搷鳴鼓些宮庭震驚發激楚些吳歈蔡謳奏大呂些士女雜坐亂而不分些放敶組纓班其相紛些鄭衛妖玩來雜陳些激楚之結獨秀先些菎蔽象棊有六簙些分曹並進遒相迫些成梟而牟呼五白些晉制犀比費白日些鏗鍾搖虡揳梓瑟些娛酒不廢沈日夜些蘭膏明燭華鐙錯些結撰至思蘭芳假些人有所極同心賦些酎飲盡歡樂先故些魂兮歸來反故居些亂曰獻歲發春兮汩吾南征菉蘋齊葉兮白芷生路貫廬江兮左長薄倚沼畦瀛兮遙望博青驪結駟兮齊千乘懸火延起兮玄顏烝步及驟處兮誘騁先抑騖若通兮引車右還與王趨夢兮課後先君王親發兮憚青兕朱明承夜兮時不可以淹皋蘭被徑兮斯路漸湛湛江水兮上有楓目極千里兮傷春心魂兮歸來哀江南
