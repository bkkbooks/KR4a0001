body:
  text: 九歌東皇太一吉日兮辰良穆將愉兮上皇撫長劍兮玉珥璆鏘鳴兮琳琅瑤席兮玉瑱盍將把兮瓊芳蕙肴蒸兮蘭藉奠桂酒兮椒漿揚枹兮拊鼓疏緩節兮安歌陳竽瑟兮浩倡靈偃蹇兮姣服芳菲菲兮滿堂五音紛兮繁會君欣欣兮樂康雲中君浴蘭湯兮沐芳華采衣兮若英靈連蜷兮既留爛昭昭兮未央蹇將憺兮壽宮與日月兮齊光龍駕兮帝服聊翱遊兮周章靈皇皇兮既降猋遠舉兮雲中覽冀州兮有餘橫四海兮焉窮思夫君兮太息極勞心兮𢥞𢥞湘君君不行兮夷猶蹇誰留兮中洲美要眇兮宜脩沛吾乘兮桂舟令沅湘兮無波使江水兮安流望夫君兮未來吹參差兮誰思駕飛龍兮北征邅吾道兮洞庭薜荔柏兮蕙綢蓀橈兮蘭旌望涔陽兮極浦橫大江兮揚靈揚靈兮未極女嬋媛兮為余太息橫流涕兮潺湲隱思君兮陫側桂櫂兮蘭枻斲冰兮積雪采薜荔兮水中搴芙蓉兮木末心不同兮媒勞恩不甚兮輕絕石瀨兮淺淺飛龍兮翩翩交不忠兮怨長期不信兮告余以不閒鼂騁騖兮江皋夕弭節兮北渚鳥次兮屋上水周兮堂下捐余玦兮江中遺余佩兮醴浦采芳洲兮杜若將以遺兮下女時不可兮再得聊逍遙兮容與湘夫人帝子降兮北渚目眇眇兮愁予嫋嫋兮秋風洞庭波兮木葉下白薠兮騁望與佳期兮夕張鳥萃兮蘋中罾何為兮木上沅有茝兮醴有蘭思公子兮未敢言荒忽兮遠望觀流水兮潺湲麋何食兮庭中蛟何為兮水裔朝馳余馬兮江皋夕濟兮西澨聞佳人兮召予將騰駕兮偕逝築室兮水中葺之兮荷蓋蓀壁兮紫壇播芳椒兮成堂桂棟兮蘭橑辛夷楣兮藥房罔薜荔兮為帷擗蕙櫋兮既張白玉兮為鎮疏石蘭兮為芳芷葺兮荷屋繚之兮杜衡合百草兮實庭建芳馨兮廡門九嶷繽兮並迎靈之來兮如雲捐余袂兮江中遺余褋兮醴浦搴汀洲兮杜若將以遺兮遠者時不可兮驟得聊逍遙兮容與大司命廣開兮天門紛吾乘兮玄雲令飄風兮先驅使涷雨兮灑塵君迴翔兮以下踰空桑兮從女紛總總兮九州何壽夭兮在予高飛兮安翔乘清氣兮御陰陽吾與君兮齋速導帝之兮九坑靈衣兮被被玉佩兮陸離壹陰兮壹陽眾莫知兮余所為折疏麻兮瑤華將以遺兮離居老冉冉兮既極不濅近兮愈疏乘龍兮轔轔高駝兮沖天結桂枝兮延佇羌愈思兮愁人愁人兮奈何願若今兮無虧固人命兮有當孰離合兮可為少司命秋蘭兮麋蕪羅生兮堂下綠葉兮素枝芳菲菲兮襲予夫人自有兮美子蓀何以兮愁苦秋蘭兮青青綠葉兮紫莖滿堂兮美人忽獨與余兮目成入不言兮出不辭乘回風兮載雲旗悲莫悲兮生別離樂莫樂兮新相知荷衣兮蕙帶儵而來兮忽而逝夕宿兮帝郊君誰須兮雲之際與女遊兮九河衝風至兮水揚波與女沐兮咸池晞女髮兮陽之阿望美人兮未來臨風怳兮浩歌孔蓋兮翠旍登九天兮撫彗星竦長劍兮擁幼艾蓀獨宜兮為民正東君暾將出兮東方照吾檻兮扶桑撫余馬兮安驅夜皎皎兮既明駕龍輈兮乘雷載雲旗兮委蛇長太息兮將上心低佪兮顧懷羌聲色兮娛人觀者憺兮忘歸緪瑟兮交鼓簫鍾兮瑤虡鳴篪兮吹竽思靈保兮賢姱翾飛兮翠曾展詩兮會舞應律兮合節靈之來兮蔽日青雲衣兮白霓裳舉長矢兮射天狼操余弧兮反淪降援北斗兮酌桂漿撰余轡兮高駝翔杳冥冥兮以東行河伯與女遊兮九河衝風起兮橫波乘水車兮荷蓋駕兩龍兮驂螭登崑崙兮四望心飛揚兮浩蕩日將暮兮悵忘歸惟極浦兮寤懷魚鱗屋兮龍堂紫貝闕兮朱宮靈何為兮水中乘白黿兮逐文魚與女遊兮河之渚流澌紛兮將來下子交手兮東行送美人兮南浦波滔滔兮來迎魚鄰鄰兮媵予山鬼若有人兮山之阿被薜荔兮帶女羅既含睇兮又宜笑子慕予兮善窈窕乘赤豹兮從文狸辛夷車兮結桂旗被石蘭兮帶杜衡折芳馨兮遺所思余處幽篁兮終不見天路險難兮獨後來表獨立兮山之上雲容容兮而在下杳冥冥兮羌晝晦東風飄兮神靈雨留靈脩兮憺忘歸歲既晏兮孰華予采三秀兮於山間石磊磊兮葛蔓蔓怨公子兮悵忘歸君思我兮不得閒山中人兮芳杜若飲石泉兮蔭松柏君思我兮然疑作靁填填兮雨冥冥猨啾啾兮又夜鳴風颯颯兮木蕭蕭思公子兮徒離憂國殤操吳戈兮被犀甲車錯轂兮短兵接旌蔽日兮敵若雲矢交墜兮士爭先凌余陣兮躐余行凌休陣兮躐余行左驂殪兮右刃傷霾兩輪兮縶四馬援玉枹兮擊鳴鼓天時墜兮威靈怒嚴殺盡兮棄原𡐨出不入兮往不反平原忽兮路超遠帶長劍兮挾秦弓首身離兮心不懲誠既勇兮又以武終剛強兮不可凌身既死兮神以靈子魂魄兮為鬼雄禮魂成禮兮會鼓傳芭兮代舞姱女倡兮容與春蘭兮秋菊長無絕兮終古
