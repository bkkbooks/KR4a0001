body:
  text: 天問曰遂古之初誰傳道之上下未形何由考之冥昭瞢暗誰能極之馮翼惟像何以識之明明暗暗惟時何為陰陽三合何本何化圜則九重孰營度之惟茲何功孰初作之斡維焉繫天極焉加八柱何當東南何虧九天之際安放安屬隅隈多有誰知其數天何所沓十二焉分日月安屬列星安陳出自湯谷次于蒙汜自明及晦所行幾里夜光何德死則又育厥利維何而顧菟在腹女岐無合夫焉取九子伯強何處惠氣安在何闔而晦何開而明角宿未旦曜靈安藏不任汩鴻師何以尚之僉曰何憂何不課而行之鴟龜曳銜鯀何聽焉順欲成功帝何刑焉永遏在羽山夫何三年不施伯禹愎鯀夫何以變化纂就前緒遂成考功何續初繼業而厥謀不同洪泉極深何以填之地方九則何以墳之河海應龍何盡何歷鯀何所營禹何所成康回馮怒墬何故以東南傾九州安錯川谷何汙東流不溢孰知其故東西南北其修孰多南北順橢其衍幾何崑崙縣圃其凥安在增城九重其高幾里四方之門其誰從焉西北辟啓何氣通焉日安不到燭龍何照羲和之未揚若華何光何所冬暖何所夏寒焉有石林何獸能言焉有虬龍負熊以遊雄虺九首倏忽焉在何所不死長人何守靡蓱九衢枲華安居一蛇吞象厥大何如黑水玄趾三危安在延年不死壽何所止鯪魚何所鬿堆焉處羿焉彃日烏焉解羽禹之力獻功降省下土四方焉得彼嵞山女而通之于台桑閔妃匹合厥身是繼胡維嗜不同味而快鼂飽啓代益作后卒然離蠥何啓惟憂而能拘是達皆歸射𥷚而無害厥躬何后益作革而禹播降啓棘賓商九辨九歌何勤子屠母而死分竟地帝降夷羿革孽夏民胡射夫河伯而妻彼雒嬪馮珧利決封狶是射何獻蒸肉之膏而后帝不若浞娶純狐眩妻爰謀何羿之射革而交吞揆之阻窮西征巖何越焉化為黃熊巫何活焉咸播秬黍莆雚是營何由并投而鯀疾修盈白霓嬰茀胡為此堂安得夫良藥不能固臧天式從橫陽離爰死大鳥何鳴夫焉喪厥體蓱號起雨何以興之撰體協脅鹿何膺之鼇戴山抃何以安之釋舟陵行何以遷之惟澆在戶何求于嫂何少康逐犬而顛隕厥首女歧縫裳而館同爰止何顛易厥首而親以逢殆湯謀易旅何以厚之覆舟斟尋何道取之桀伐蒙山何所得焉妹嬉何肆湯何殛焉舜閔在家父何以鱞堯不姚告二女何親厥萌在初何所億焉璜臺十成誰所極焉登立為帝孰道尚之女媧有體孰制匠之舜服厥弟終然為害何肆犬體而厥身不危敗吳獲迄古南嶽是止孰期去斯得兩男子緣鵠飾玉后帝是饗何承謀夏桀終以滅喪帝乃降觀下逢伊摯何條放致罰而黎服大說簡狄在臺嚳何宜玄鳥致貽女何喜該秉季德厥父是臧胡終弊于有扈牧夫牛羊干協時舞何以懷之平脅曼膚何以肥之有扈牧豎云何而逢擊床先出其命何從恆秉季德焉得夫朴牛何往營班祿不但還來昏微遵迹有狄不寧何繁鳥萃棘負子肆情眩弟並淫危害厥兄何變化以作詐後嗣而逢長成湯東巡有莘爰極何乞彼小臣而吉妃是得水濱之木得彼小子夫何惡之媵有莘之婦湯出重泉夫何罪尤不勝心伐帝夫誰使挑之會鼂爭盟何踐吾期蒼鳥群飛孰使萃之到擊紂躬叔旦不嘉何親揆發足周之命以咨嗟授殷天下其位安施反成乃亡其罪伊何爭遣伐器何以行之並驅擊翼何以將之昭后成遊南土爰底厥利惟何逢彼白雉穆王巧梅夫何為周流環理天下夫何索求妖夫曳衒何號于市周幽誰誅焉得夫褒姒天命反側何罰何佑齊桓九會卒然身殺彼王紂之躬孰使亂惑何惡輔弼讒諂是服比干何逆而抑沈之雷開阿順而賜封之何聖人之一德卒其異方梅伯受醢箕子詳狂稷維元子帝何竺之投之於冰上鳥何燠之何馮弓挾矢殊能將之既驚帝切激何逢長之伯昌號衰秉鞭作牧何令徹彼岐社命有殷國遷藏就岐何能依殷有惑婦何所譏受賜茲醢西伯上告何親就上帝罰殷之命以不救師望在肆昌何識鼓刀揚聲后何喜武發殺殷何所悒載尸集戰何所急伯林雉經維其何故何感天抑墬夫誰畏懼皇天集命惟何戒之受禮天下又使至代之初湯臣摯後茲承輔何卒官湯尊食宗緒勳闔夢生少離散亡何壯武厲能流厥嚴彭鏗斟雉帝何饗受壽永多夫何久長中央共牧后何怒蜂蛾微命力何固驚女采薇鹿何祐北至回水萃何喜兄有噬犬弟何欲易之以百兩卒無祿薄暮雷電歸何憂厥嚴不奉帝何求伏匿穴處爰何云荊勳作師夫何長悟過改更我又何言吳光爭國久余是勝何環穿自閭社丘陵爰出子文吾告堵敖以不長何試上自豫忠名彌彰
