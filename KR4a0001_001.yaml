body:
  text: 離騷經帝高陽之苗裔兮朕皇考曰伯庸攝提貞于孟陬兮惟庚寅吾以降皇覽揆余初度兮肇錫余以嘉名名余曰正則兮字余曰靈均紛吾既有此內美兮又重之以修能扈江離與辟芷兮紉秋蘭以為佩汩余若將不及兮恐年歲之不吾與朝搴阰之木蘭兮夕攬洲之宿莽日月忽其不淹兮春與秋其代序惟草木之零落兮恐美人之遲暮不撫壯而棄穢兮何不改此度乘騏驥以馳騁兮來吾道夫先路昔三后之純粹兮固衆芳之所在雜申椒與菌桂兮豈維紉夫蕙茝彼堯舜之耿介兮既遵道而得路何桀紂之猖披兮夫唯捷徑以窘步惟夫黨人之偷樂兮路幽昧以險隘豈余身之憚殃兮恐皇輿之敗績忽奔走以先後兮及前王之踵武荃不察余之中情兮反信讒而齌怒余固知謇謇之為患兮忍而不能舍也指九天以為正兮夫唯靈修之故也曰黃昏以為期兮羌中道而改路初既與余成言兮後悔遁而有他余既不難夫離別兮傷靈修之數化余既滋蘭之九畹兮又樹蕙之百畝畦留夷與揭車兮雜杜衡與芳芷冀枝葉之峻茂兮願俟時乎吾將刈雖萎絶其亦何傷兮哀衆芳之蕪穢衆皆競進以貪婪兮憑不猒乎求索羌內恕己以量人兮各興心而嫉妒忽馳騖以追逐兮非余心之所急老冉冉其將至兮恐修名之不立朝飲木蘭之墜露兮夕餐秋菊之落英苟余情其信姱以練要兮長顑頷亦何傷攬木根以結茝兮貫薜荔之落蕊矯菌桂以紉蕙兮索胡繩之纚纚謇吾法夫前修兮非世俗之所服雖不周於今之人兮願依彭咸之遺則長太息以掩涕兮哀民生之多艱余雖好修姱以鞿羈兮謇朝誶而夕替既替余以蕙纕兮又申之以攬茝亦余心之所善兮雖九死其猶未悔怨靈修之浩蕩兮終不察夫民心衆女嫉余之蛾眉兮謠諑謂余以善淫固時俗之工巧兮偭規矩而改錯背繩墨以追曲兮競周容以為度忳鬱邑余侘傺兮吾獨窮困乎此時也寧溘死以流亡兮余不忍為此態也鷙鳥之不群兮自前世而固然何方圜之能周兮夫孰異道而相安屈心而抑志兮忍尤而攘詬伏清白以死直兮固前聖之所厚悔相道之不察兮延佇乎吾將反回朕車以復路兮及行迷之未遠步余馬於蘭皋兮馳椒丘且焉止息進不入以離尤兮退將復修吾初服製芰荷以為衣兮集芙蓉以為裳不吾知其亦已兮苟余情其信芳高余冠之岌岌兮長余佩之陸離芳與澤其雜糅兮唯昭質其猶未虧忽反顧以遊目兮將往觀乎四荒佩繽紛其繁飾兮芳菲菲其彌章民生各有所樂兮余獨好修以為常雖體解吾猶未變兮豈余心之可懲女嬃之嬋媛兮申申其詈豫曰鯀婞直以亡身兮終然夭乎羽之野汝何博謇而好修兮紛獨有此姱節薋菉葹以盈室兮判獨離而不服衆不可戶説兮孰云察余之中情世並舉而好朋兮夫何焭獨而不豫聽依前聖以節中兮喟憑心而歷茲濟沅湘以南征兮就重華而敶詞啓九辨與九歌兮夏康娛以自縱不顧難以圖後兮五子用失乎家巷羿淫遊以佚畋兮又好射夫封狐固亂流其鮮終兮浞又貪夫厥家澆身被服強圉兮縱欲而不忍日康娛而自忘兮厥首用夫顛隕夏桀之常違兮乃遂焉而逢殃后辛之菹醢兮殷宗用而不長湯禹儼而祗敬兮周論道而莫差舉賢而授能兮循繩墨而不頗皇天無私阿兮覽民德焉錯輔夫維聖哲以茂行兮苟得用此下土瞻前而顧後兮相觀民之計極夫孰非義而可用兮孰非善而可服阽余身而危死兮覽余初其猶未悔不量鑿而正枘兮固前修以菹醢曾歔欷余鬱邑兮哀朕時之不當攬茹蕙以掩涕兮霑余襟之浪浪跪敷衽以陳辭兮耿吾既得此中正駟玉虬以乘鷖兮溘埃風余上征朝發軔於蒼梧兮夕余至乎縣圃欲少留此靈瑣兮日忽忽其將暮吾令羲和弭節兮望崦嵫而勿迫路曼曼其修遠兮吾將上下而求索飲余馬於咸池兮總余轡乎扶桑折若木以拂日兮聊逍遙以相羊前望舒使先驅兮後飛廉使奔屬鸞皇為余先戒兮雷師告余以未具吾令鳳鳥飛騰兮繼之以日夜飄風屯其相離兮帥雲霓而來御紛總總其離合兮斑陸離其上下吾令帝閽開關兮倚閶闔而望豫時曖曖其將罷兮結幽蘭而延佇世溷濁而不分兮好蔽美而嫉妒朝吾將濟於白水兮登閬風而緤馬忽反顧以流涕兮哀高丘之無女溘吾遊此春宮兮折瓊枝以繼佩及榮華之未落兮相下女之可詒吾令豐隆乘雲兮求宓妃之所在解佩纕以結言兮吾令蹇修以為理紛總總其離合兮忽緯繣其難遷夕歸次於窮石兮朝濯髮乎洧盤保厥美以驕傲兮日康娛以淫遊雖信美而無禮兮來違棄而改求覽相觀於四極兮周流乎天余乃下望瑤臺之偃蹇兮見有娀之佚女吾令鴆為媒兮鴆告余以不好雄鳩之鳴逝兮余猶惡其佻巧心猶豫而狐疑兮欲自適而不可鳳皇既受詒兮恐高辛之先我欲遠集而無所止兮聊浮遊以逍遙及少康之未家兮留有虞之二姚理弱而媒拙兮恐導言之不固世溷濁而嫉賢兮好蔽美而稱惡閨中既以邃遠兮哲王又不寤懷朕情而不發兮余焉能忍與此終古索藑茅以筳蓴兮命靈氛為余占之曰兩美其必合兮孰信修而慕之思九州之博大兮豈唯是其有女曰勉遠逝而無狐疑兮孰求美而釋女何所獨無芳草兮爾何懷乎故宇世幽昧以昡曜兮孰云察余之善惡民好惡其不同兮惟此黨人其獨異戶服艾以盈要兮謂幽蘭其不可佩覽察草木其猶未得兮豈珵美之能當蘇糞壤以充幃兮謂申椒其不芳欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈而要之百神翳其備降兮九疑繽其並迎皇剡剡其揚靈兮告余以吉故曰勉升降以上下兮求矩矱之所同湯禹嚴而求合兮摯咎繇而能調苟中情其好修兮又何必用夫行媒説操築於傅巖兮武丁用而不疑呂望之鼓刀兮遭周文而得舉寧戚之謳歌兮齊桓聞以該輔及年歲之未晏兮時亦猶其未央恐鵜鴂之先鳴兮使夫百草為之不芳何瓊佩之偃蹇兮衆薆然而蔽之惟此黨人之不諒兮恐嫉妒而折之時繽紛其變易兮又何可以淹留蘭芷變而不芳兮荃蕙化而為茅何昔日之芳草兮今直為此蕭艾也豈其有他故兮莫好修之害也余以蘭為可恃兮羌無實而容長委厥美以從俗兮苟得列乎衆芳椒專佞以慢慆兮樧又欲充夫佩幃既干進而務入兮又何芳之能祗固時俗之流從兮又孰能無變化覽椒蘭其若茲兮又況揭車與江離惟茲佩之可貴兮委厥美而歷茲芳菲菲而難虧兮芬至今猶未沫和調度以自娛兮聊浮遊而求女及余飾之方壯兮周流觀乎上下靈氛既告余以吉占兮歷吉日乎吾將行折瓊枝以為羞兮精瓊爢以為粻為余駕飛龍兮雜瑤象以為車何離心之可同兮吾將遠逝以自疏邅吾道夫崑崙兮路修遠以周流揚雲霓之暗藹兮鳴玉鸞之啾啾朝發軔於天津兮夕余至乎西極鳳皇翼其承旗兮高翱翔之翼翼忽吾行此流沙兮遵赤水而容與麾蛟龍使梁津兮詔西皇使涉豫路修遠以多艱兮騰衆車使徑待路不周以左轉兮指西海以為期屯余車其千乘兮齊玉軑而並馳駕八龍之婉婉兮載雲旗之委蛇抑志而弭節兮神高馳之邈邈奏九歌而舞韶兮聊假日以偷樂陟升皇之赫戲兮忽臨睨夫舊鄉僕夫悲余馬懷兮蜷局顧而不行亂曰已矣哉國無人莫我知兮又何懷乎故都既莫足與為美政兮吾將從彭咸之所居
