body:
  text: 卜居屈原既放三年不得復見竭知盡忠而蔽鄣於讒心煩慮亂不知所從往見太卜鄭詹尹曰余有所疑願因先生決之詹尹乃端策拂龜曰君將何以教之屈原曰吾寧悃悃款款朴以忠乎將送往勞來斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗富貴以偷生乎寧超然高舉以保真乎將哫訾栗斯喔咿儒兒以事婦人乎寧廉潔正直以自清乎將突梯滑稽如脂如韋以潔楹乎寧昂昂若千里之駒乎將泛泛若水中之鳧乎與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之迹乎寧與黃鵠比翼乎將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黃鍾毀棄瓦釜雷鳴讒人高張賢士無名吁嗟默默兮誰知吾之廉貞詹尹乃釋策而謝曰夫尺有所短寸有所長物有所不足智有所不明數有所不逮神有所不通用君之心行君之意龜策誠不能知事
