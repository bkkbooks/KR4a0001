body:
  text: 遠遊悲時俗之迫阨兮願輕舉而遠遊質菲薄而無因兮焉託乘而上浮遭沈濁而汙穢兮獨鬱結其誰語夜耿耿而不寐兮魂焭焭而至曙惟天地之無窮兮哀人生之長勤往者余弗及兮來者吾不聞步徙倚而遙思兮怊惝怳而乖懷意荒忽而流蕩兮心愁悽而增悲神儵忽而不反兮形枯槁而獨留內惟省以端操兮求正氣之所由漠虛靜以恬愉兮澹無為而自得聞赤松之清塵兮願承風乎遺則貴真人之休德兮美往世之登仙與化去而不見兮名聲著而日延奇傅說之託辰星兮羡韓眾之得一形穆穆以浸遠兮離人群而遁逸因氣變而遂曾舉兮忽神奔而鬼怪時髣髴以遙見兮精皎皎以往來絕氛埃而淑尤兮終不反其故都免眾患而不懼兮世莫知其所如恐天時之代序兮耀靈曄而西征微霜降而下淪兮悼芳草之先零聊仿佯而逍遙兮永歷年而無成誰可與玩斯遺芳兮晨向風而舒情高陽邈以遠兮余將焉所程重曰春秋忽其不淹兮奚久留此故居軒轅不可攀援兮吾將從王喬而娛戲餐六氣而飲沆瀣兮漱正陽而含朝霞保神明之清澄兮精氣入而麤穢除順凱風以從遊兮至南巢而壹息見王子而宿之兮審壹氣之和德曰道可受兮不可傳其小無內兮其大無垠無滑而魂兮彼將自然壹氣孔神兮於中夜存虛以待之兮無為之先庶類以成兮此德之門聞至貴而遂徂兮忽乎吾將行仍羽人於丹丘兮留不死之舊鄉朝濯髮於湯谷兮夕晞余身兮九陽吸飛泉之微液兮懷琬琰之華英玉色頩以脕顏兮精醇粹而始壯質銷鑠以汋約兮神要眇以淫放嘉南州之炎德兮麗桂樹之冬榮山蕭條而無獸兮野寂漠其無人載營魄而登霞兮掩浮雲而上征命天閽其開關兮排閶闔而望予召豐隆使先導兮問大微之所居集重陽入帝宮兮造旬始而觀清都朝發軔於太儀兮夕始臨乎於微閭屯余車之萬乘兮紛溶與而並馳駕八龍之婉婉兮載雲旗之逶蛇建雄虹之采旄兮五色雜而炫燿服偃蹇以低昂兮驂連蜷以驕驁騎膠葛以雜亂兮斑漫衍而方行撰余轡而正策兮吾將過乎句芒歷太皓以右轉兮前飛廉以啟路陽杲杲其未光兮淩天地以徑度風伯為余先驅兮氛埃辟而清涼鳳皇翼其承旂兮遇蓐收乎西皇擥彗星以為旍兮舉斗柄以為麾叛陸離其上下兮遊驚霧之流波時曖曃其曭莽兮召玄武而奔屬後文昌使掌行兮選署眾神以並轂路曼曼其脩遠兮徐弭節而高厲左雨師使徑侍兮右雷公以為衛欲度世以忘歸兮意恣睢以担撟內欣欣而自美兮聊媮娛以自樂涉青雲以汎濫游兮忽臨睨夫舊鄉僕夫懷余心悲兮邊馬顧而不行思舊故以想像兮長太息而掩涕氾容與而遐舉兮聊抑志而自弭指炎神而直馳兮吾將往乎南疑覽方外之荒忽兮沛罔象而自浮祝融戒而還衡兮騰告鸞鳥迎宓妃張咸池奏承雲兮二女御九韶歌使湘靈鼓瑟兮令海若舞馮夷玄螭蟲象並出進兮形蟉虬而逶蛇雌蜺便娟以增撓兮鸞鳥軒翥而翔飛音樂博衍無終極兮焉乃逝以俳佪舒并節以馳騖兮逴絕垠乎寒門軼迅風於清源兮從顓頊乎增冰歷玄冥以邪徑兮乘間維以反顧召黔嬴而見之兮為余先乎平路經營四荒兮周流六漠上至列𡙇兮降望大壑下崢嶸而無地兮上寥廓而無天視儵忽而無見兮聽惝怳而無聞超無為以至清兮與泰初而為鄰
